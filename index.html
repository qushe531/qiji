<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>奇迹小卖部 - MC线上点单商城</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        mainPurple: '#9370E8',
                        mainOrange: '#FF8A18',
                        lightBg: '#F5F3FF',
                    }
                }
            }
        }
    </script>
    <style>
        .mc-item-img {
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-thumb { background: #9370E8; border-radius: 4px; }
        .btn-press:active { transform: scale(0.97); opacity: 0.9; }
        .modal-enter { animation: fadeIn 0.2s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="bg-lightBg min-h-screen font-sans">
    <!-- 商城首页 -->
    <div id="pageHome">
        <header class="bg-mainPurple px-4 py-3 flex items-center justify-between shadow-md sticky top-0 z-40">
            <h1 class="text-white text-xl font-bold flex items-center gap-2">
                <i class="fa fa-shopping-bag"></i> 奇迹小卖部
            </h1>
            <div class="flex flex-1 mx-4 max-w-lg">
                <input id="searchInput" type="text" placeholder="搜索商品名称" class="w-full px-3 py-1.5 rounded-l-md outline-none text-sm">
                <button onclick="searchGoods()" class="bg-indigo-700 text-white px-4 py-1.5 rounded-r-md btn-press text-sm">搜索</button>
            </div>
            <div class="flex items-center gap-3">
                <span id="showUserName" class="text-white text-sm hidden md:block"></span>
                <!-- 新增解密入口按钮 -->
                <button onclick="openDecryptModal()" class="border border-white px-2 py-1 rounded text-white text-sm btn-press">信息解密</button>
                <button onclick="logoutUser()" class="text-white btn-press"><i class="fa fa-sign-out"></i> 退出</button>
            </div>
        </header>

        <main class="container mx-auto px-3 py-6 pb-24">
            <div id="goodsGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-4"></div>
        </main>

        <div class="fixed bottom-0 left-0 w-full bg-white shadow-inner flex justify-center gap-6 py-3 z-30">
            <button onclick="alert('订单查询功能开发中')" class="flex items-center gap-1 text-gray-600 btn-press">
                <i class="fa fa-search"></i> 我的订单
            </button>
            <button onclick="switchPageHome()" class="flex items-center gap-1 text-mainPurple font-medium btn-press">
                <i class="fa fa-home"></i> 商城首页
            </button>
        </div>

        <!-- 购物车悬浮按钮 -->
        <button onclick="openCartPanel()" class="fixed bottom-16 right-4 w-14 h-14 rounded-full bg-mainPurple text-white shadow-lg flex items-center justify-center text-xl btn-press z-40">
            <i class="fa fa-shopping-cart"></i>
            <span id="cartBadgeNum" class="absolute -top-1 -right-1 bg-red-500 w-5 h-5 rounded-full text-xs flex items-center justify-center">0</span>
        </button>

        <!-- 左下角客服按钮 -->
        <button onclick="openServiceModal()" class="fixed bottom-16 left-4 w-12 h-12 rounded-full bg-green-500 text-white shadow-lg flex items-center justify-center text-lg btn-press z-40">
            <i class="fa fa-comments"></i>
        </button>
    </div>

    <!-- 解密弹窗（首页点击信息解密打开） -->
    <div id="decryptModal" class="fixed inset-0 bg-black/60 z-[1002] hidden modal-enter flex items-center justify-center">
        <div class="bg-white rounded-xl p-6 w-[90%] max-w-md">
            <h2 class="text-xl font-bold mb-4 text-center text-mainPurple">客户送货信息解密工具</h2>
            <div class="space-y-3 mb-4">
                <input id="decryptPwdInput" type="password" placeholder="输入解密密码：1QAZ2WSX3EDC4RFV" class="w-full border rounded-lg px-3 py-2">
                <textarea id="encryptStrInput" rows="3" placeholder="粘贴结算生成的加密字符串" class="w-full border rounded-lg px-3 py-2 resize-none"></textarea>
            </div>
            <div class="mb-4">
                <p class="text-sm text-gray-500 mb-1">解密结果：</p>
                <textarea id="decryptResult" rows="4" readonly class="w-full border rounded-lg px-3 py-2 bg-gray-50 resize-none"></textarea>
            </div>
            <div class="grid grid-cols-2 gap-3">
                <button onclick="doDecrypt()" class="py-2 bg-mainPurple text-white rounded-lg btn-press">执行解密</button>
                <button onclick="closeDecryptModal()" class="py-2 border border-gray-300 rounded-lg text-gray-500 btn-press">关闭</button>
            </div>
        </div>
    </div>

    <!-- 登录弹窗 -->
    <div id="loginModal" class="fixed inset-0 bg-black/60 z-[1001] hidden modal-enter flex items-center justify-center">
        <div class="bg-white rounded-xl p-6 w-[90%] max-w-sm">
            <h2 class="text-xl font-bold mb-4 text-center text-mainPurple">用户登录</h2>
            <div class="space-y-3 mb-4">
                <input id="loginUsername" type="text" placeholder="输入账号" class="w-full border rounded-lg px-3 py-2">
                <input id="loginPwd" type="password" placeholder="输入密码" class="w-full border rounded-lg px-3 py-2">
            </div>
            <div class="grid grid-cols-2 gap-3 mb-3">
                <button onclick="loginSubmit()" class="py-2 bg-mainPurple text-white rounded-lg btn-press">登录</button>
                <button onclick="switchToRegister()" class="py-2 border border-mainPurple text-mainPurple rounded-lg btn-press">注册账号</button>
            </div>
            <button onclick="closeLoginModal()" class="w-full py-2 border border-gray-300 rounded-lg text-gray-500 btn-press">关闭</button>
        </div>
    </div>

    <!-- 注册弹窗 -->
    <div id="registerModal" class="fixed inset-0 bg-black/60 z-[1001] hidden modal-enter flex items-center justify-center">
        <div class="bg-white rounded-xl p-6 w-[90%] max-w-sm">
            <h2 class="text-xl font-bold mb-4 text-center text-mainPurple">新用户注册</h2>
            <div class="space-y-3 mb-4">
                <input id="regUsername" type="text" placeholder="自定义账号" class="w-full border rounded-lg px-3 py-2">
                <input id="regPwd" type="password" placeholder="设置密码（至少4位）" class="w-full border rounded-lg px-3 py-2">
                <input id="regPwd2" type="password" placeholder="重复密码" class="w-full border rounded-lg px-3 py-2">
            </div>
            <div class="grid grid-cols-2 gap-3 mb-3">
                <button onclick="registerSubmit()" class="py-2 bg-mainPurple text-white rounded-lg btn-press">完成注册</button>
                <button onclick="switchToLogin()" class="py-2 border border-mainPurple text-mainPurple rounded-lg btn-press">已有账号登录</button>
            </div>
            <button onclick="closeRegisterModal()" class="w-full py-2 border border-gray-300 rounded-lg text-gray-500 btn-press">关闭</button>
        </div>
    </div>

    <!-- 客服弹窗 -->
    <div id="serviceModal" class="fixed inset-0 bg-black/60 z-[999] hidden modal-enter flex items-center justify-center">
        <div class="bg-white rounded-xl p-6 w-[90%] max-w-sm text-center">
            <h2 class="text-xl font-bold mb-4 text-mainPurple">在线客服</h2>
            <p class="text-gray-500 mb-2">客服QQ</p>
            <p id="qqTextShow" class="text-2xl font-bold text-mainOrange mb-4">3258698798</p>
            <button onclick="copyQQ()" class="w-full py-2 bg-mainPurple text-white rounded-lg btn-press mb-3">复制QQ号</button>
            <button onclick="closeServiceModal()" class="w-full py-2 border border-gray-300 rounded-lg text-gray-500 btn-press">关闭</button>
        </div>
    </div>

    <!-- 购物车侧边弹窗 -->
    <div id="cartPanel" class="fixed inset-0 bg-black/60 z-[997] hidden modal-enter">
        <div class="absolute right-0 top-0 h-full w-full sm:w-[420px] bg-white shadow-2xl flex flex-col">
            <div class="p-4 bg-mainPurple text-white flex justify-between items-center">
                <h2 class="text-lg font-bold">我的购物车</h2>
                <button onclick="closeCartPanel()" class="text-white text-xl btn-press">✕</button>
            </div>
            <div class="flex-1 overflow-y-auto p-4">
                <div id="cartEmptyTip" class="h-full flex flex-col items-center justify-center text-gray-400">
                    <i class="fa fa-shopping-cart text-5xl mb-3"></i>
                    <p>购物车空空如也</p>
                </div>
                <div id="cartItemWrap" class="hidden space-y-3"></div>
            </div>
            <div id="cartBottomBar" class="hidden border-t p-4">
                <div class="flex justify-between items-center mb-4">
                    <span class="font-bold text-lg">合计：<span class="text-red-500 text-xl">¥<span id="cartTotalPrice">0.00</span></span></span>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="clearAllCart()" class="py-2 bg-red-100 text-red-500 rounded-lg btn-press">清空购物车</button>
                    <button onclick="goCheckoutPage()" class="py-2 bg-mainPurple text-white rounded-lg btn-press">去结算</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 结算下单页面（新增加密字符串展示区域） -->
    <div id="pageCheckout" class="fixed inset-0 bg-gray-100 overflow-auto z-[996] hidden p-4 md:p-8">
        <div class="max-w-2xl mx-auto bg-white rounded-xl p-6 shadow-lg">
            <h2 class="text-xl font-bold border-l-4 border-mainOrange pl-3 mb-6">确认订单 & 付款</h2>
            <div class="mb-6">
                <div class="flex justify-between items-center mb-3">
                    <h3 class="font-medium flex items-center gap-1"><i class="fa fa-shopping-cart"></i> 选购商品</h3>
                    <button onclick="clearAllCart()" class="bg-red-500 text-white px-3 py-1 rounded text-sm btn-press">清空购物车</button>
                </div>
                <div id="checkoutGoodsWrap" class="space-y-2 mb-4"></div>
                <div class="space-y-2 text-right">
                    <div class="flex justify-between">
                        <span>商品总额</span>
                        <span>¥<span id="checkoutTotalNum">0.00</span></span>
                    </div>
                    <div class="flex justify-between">
                        <span>配送费</span>
                        <span>¥0.00</span>
                    </div>
                    <div class="flex justify-between text-xl font-bold text-red-500 pt-2 border-t">
                        <span>应付总额</span>
                        <span>¥<span id="checkoutPayNum">0.00</span></span>
                    </div>
                </div>
                <p id="minOrderTip" class="text-orange-500 text-sm mt-2 hidden"><i class="fa fa-exclamation-triangle"></i> 订单最低消费1元，请多选购商品</p>
            </div>
            <div class="bg-amber-50 rounded-xl p-4 mb-6">
                <p class="text-center font-medium mb-4 text-gray-700">店长收款码</p>
                <div class="flex justify-center">
                    <div class="border-2 border-mainOrange rounded-xl p-3 bg-black w-full max-w-[280px]">
                        <div class="aspect-square w-full overflow-hidden rounded">
                            <img id="payCodeImg" src="https://p3-flow-imagex-sign.byteimg.com/tos-cn-i-a9rns2rl98/34111341343b403893d3d099129d3151~tplv-a9rns2rl98-image.image" alt="收款码" class="w-full h-full object-contain mc-item-img block">
                        </div>
                        <p class="text-white text-center mt-3 text-lg">“给点吧穷苦了”</p>
                        <div class="bg-amber-500 rounded-b-lg py-2 mt-2">
                            <p class="text-white text-center font-bold">Galaxy16 的赞赏码</p>
                        </div>
                    </div>
                </div>
                <p class="text-center text-orange-600 text-sm mt-3">扫码付款后提交订单，配送员会送货上门</p>
            </div>
            <div class="space-y-4 mb-6">
                <div>
                    <label class="block font-medium mb-1">收货人游戏ID（客户姓名）</label>
                    <input id="buyerNameInput" type="text" value="" class="w-full border rounded-lg px-3 py-2 outline-mainPurple">
                </div>
                <div>
                    <label class="block font-medium mb-1">联系QQ</label>
                    <input id="buyerQQInput" type="text" value="" class="w-full border rounded-lg px-3 py-2 outline-mainPurple">
                </div>
                <div>
                    <label class="block font-medium mb-1">送货坐标 X Y Z</label>
                    <input id="posInput" type="text" placeholder="例：100 64 -200" class="w-full border rounded-lg px-3 py-2 outline-mainPurple">
                    <p class="text-gray-400 text-xs mt-1">三个数字空格分隔，支持负数坐标</p>
                </div>
                <!-- 加密字符串展示框 -->
                <div>
                    <label class="block font-medium mb-1">加密送货信息串（复制发给配送）</label>
                    <textarea id="encryptResultBox" readonly rows="2" class="w-full border rounded-lg px-3 py-2 bg-gray-50 resize-none"></textarea>
                </div>
                <div>
                    <label class="block font-medium mb-1">备注（选填）</label>
                    <textarea id="noteInput" rows="2" placeholder="放置箱子/家门口等说明" class="w-full border rounded-lg px-3 py-2 outline-mainPurple"></textarea>
                </div>
                <div class="flex items-center gap-2">
                    <div class="flex-1">
                        <label class="block font-medium mb-1">验证码（计算结果）</label>
                        <input id="verifyInput" type="text" placeholder="输入答案" class="w-full border rounded-lg px-3 py-2 outline-mainPurple">
                    </div>
                    <span id="verifyQuestion" class="bg-gray-200 px-4 py-3 rounded-lg mt-5 whitespace-nowrap">5 + 7 = ?</span>
                </div>
            </div>
            <button onclick="generateEncryptStr()" class="w-full py-3 bg-gray-500 text-white font-bold rounded-lg btn-press mb-2">生成加密信息串</button>
            <button onclick="submitNewOrder()" class="w-full py-4 bg-mainOrange text-white text-lg font-bold rounded-lg btn-press flex items-center justify-center gap-2">
                <i class="fa fa-check"></i> 提交订单
            </button>
            <button onclick="backToShop()" class="w-full mt-3 py-2 border border-gray-300 rounded-lg text-gray-600 btn-press">返回商城首页</button>
        </div>
    </div>

    <script>
        // 全局常量配置
        const SERVICE_QQ = "3258698798";
        const GOODS_PRICE = 0.2; // 每件商品固定0.2元
        const DECRYPT_PASSWORD = "1QAZ2WSX3EDC4RFV"; // 解密专用密码
        let verifyA, verifyB, verifyAns;

        // 本地存储工具函数
        function getLocal(key) { return JSON.parse(localStorage.getItem(key)) || []; }
        function setLocal(key, data) { localStorage.setItem(key, JSON.stringify(data)); }

        // 数据存储池
        let userList = getLocal("mcUserList");
        let loginUser = getLocal("mcLoginUser")[0] || null;
        // 固定商品列表，无编辑功能
        const goodsList = [
            { id: 1, name: "钻石块", img: "https://picsum.photos/id/1/128/128" },
            { id: 2, name: "铁块", img: "https://picsum.photos/id/2/128/128" },
            { id: 3, name: "金苹果", img: "https://picsum.photos/id/3/128/128" },
            { id: 4, name: "附魔书", img: "https://picsum.photos/id/4/128/128" },
            { id: 5, name: "下界合金锭", img: "https://picsum.photos/id/5/128/128" },
            { id: 6, name: "海绵", img: "https://picsum.photos/id/6/128/128" },
        ];
        let cartData = getLocal("mcCart");

        // DOM快速选择器
        const $ = s => document.querySelector(s);
        const goodsGrid = $("#goodsGrid");
        const cartBadgeNum = $("#cartBadgeNum");
        const cartEmptyTip = $("#cartEmptyTip");
        const cartItemWrap = $("#cartItemWrap");
        const cartBottomBar = $("#cartBottomBar");
        const cartTotalPrice = $("#cartTotalPrice");
        const loginModal = $("#loginModal");
        const registerModal = $("#registerModal");
        const showUserName = $("#showUserName");
        const serviceModal = $("#serviceModal");
        const qqTextShow = $("#qqTextShow");
        const pageHome = $("#pageHome");
        const pageCheckout = $("#pageCheckout");
        const cartPanel = $("#cartPanel");
        const verifyQuestion = $("#verifyQuestion");
        const minOrderTip = $("#minOrderTip");
        const checkoutGoodsWrap = $("#checkoutGoodsWrap");
        const checkoutTotalNum = $("#checkoutTotalNum");
        const checkoutPayNum = $("#checkoutPayNum");
        const buyerNameInput = $("#buyerNameInput");
        const buyerQQInput = $("#buyerQQInput");
        const posInput = $("#posInput");
        const noteInput = $("#noteInput");
        const verifyInput = $("#verifyInput");
        const searchInput = $("#searchInput");
        const encryptResultBox = $("#encryptResultBox");
        // 解密弹窗DOM
        const decryptModal = $("#decryptModal");
        const decryptPwdInput = $("#decryptPwdInput");
        const encryptStrInput = $("#encryptStrInput");
        const decryptResult = $("#decryptResult");

        // 页面初始化
        init();
        function init() {
            createVerifyCode();
            checkLoginStatus();
            renderShopGoods();
            refreshCartBadge();
            qqTextShow.innerText = SERVICE_QQ;
        }

        // 登录状态校验
        function checkLoginStatus() {
            if (loginUser) {
                showUserName.innerText = "欢迎，" + loginUser.username;
            } else {
                openLoginModal();
            }
        }

        // 登录弹窗控制
        function openLoginModal() { loginModal.classList.remove("hidden"); registerModal.classList.add("hidden"); }
        function closeLoginModal() { loginModal.classList.add("hidden"); }
        function switchToRegister() { openRegisterModal(); }
        window.loginSubmit = function () {
            const u = $("#loginUsername").value.trim();
            const p = $("#loginPwd").value.trim();
            const user = userList.find(item => item.username === u && item.password === p);
            if (!u || !p) return alert("账号密码不能为空");
            if (!user) return alert("账号或密码错误");
            loginUser = { username: u };
            setLocal("mcLoginUser", [loginUser]);
            showUserName.innerText = "欢迎，" + u;
            closeLoginModal();
            $("#loginUsername").value = "";
            $("#loginPwd").value = "";
            alert("登录成功！");
        }

        // 注册弹窗控制
        function openRegisterModal() { registerModal.classList.remove("hidden"); loginModal.classList.add("hidden"); }
        function closeRegisterModal() { registerModal.classList.add("hidden"); }
        function switchToLogin() { openLoginModal(); }
        window.registerSubmit = function () {
            const u = $("#regUsername").value.trim();
            const p = $("#regPwd").value.trim();
            const p2 = $("#regPwd2").value.trim();
            if (!u || !p) return alert("账号密码不能为空");
            if (p !== p2) return alert("两次输入密码不一致");
            if (p.length < 4) return alert("密码至少4位");
            if (userList.find(item => item.username === u)) return alert("该账号已被注册");
            userList.push({ username: u, password: p });
            setLocal("mcUserList", userList);
            alert("注册成功，请登录");
            switchToLogin();
            $("#regUsername").value = "";
            $("#regPwd").value = "";
            $("#regPwd2").value = "";
        }

        // 退出登录
        window.logoutUser = function () {
            localStorage.removeItem("mcLoginUser");
            loginUser = null;
            showUserName.innerText = "";
            openLoginModal();
        }

        // 客服弹窗功能
        function openServiceModal() { serviceModal.classList.remove("hidden"); }
        function closeServiceModal() { serviceModal.classList.add("hidden"); }
        window.copyQQ = function () {
            navigator.clipboard.writeText(SERVICE_QQ).then(() => alert("客服QQ复制成功！"));
        }

        // ========== 加密解密核心逻辑 ==========
        // 打开解密弹窗
        function openDecryptModal() {
            decryptModal.classList.remove("hidden");
            decryptPwdInput.value = "";
            encryptStrInput.value = "";
            decryptResult.value = "";
        }
        function closeDecryptModal() {
            decryptModal.classList.add("hidden");
        }
        // 结算页生成加密字符串
        window.generateEncryptStr = function () {
            const name = buyerNameInput.value.trim();
            const qq = buyerQQInput.value.trim();
            const pos = posInput.value.trim();
            if (!name || !qq || !pos) return alert("请先填写姓名、QQ、送货坐标");
            // 拼接原始明文：姓名|QQ|坐标
            const rawText = `${name}|${qq}|${pos}`;
            // Base64加密
            const encryptText = btoa(unescape(encodeURIComponent(rawText)));
            encryptResultBox.value = encryptText;
            alert("加密串已生成，可复制发给配送人员！");
        }
        // 解密函数
        window.doDecrypt = function () {
            const inputPwd = decryptPwdInput.value.trim();
            const encryptText = encryptStrInput.value.trim();
            if (inputPwd !== DECRYPT_PASSWORD) return decryptResult.value = "解密密码错误！";
            if (!encryptText) return decryptResult.value = "请粘贴加密字符串";
            try {
                // Base64解密
                const rawText = decodeURIComponent(escape(atob(encryptText)));
                const [name, qq, pos] = rawText.split("|");
                const res = `客户姓名：${name}\n联系QQ：${qq}\n送货坐标：${pos}`;
                decryptResult.value = res;
            } catch (err) {
                decryptResult.value = "加密字符串格式错误，解密失败";
            }
        }

        // 商城商品渲染+搜索
        function renderShopGoods() {
            goodsGrid.innerHTML = "";
            const key = searchInput.value.trim().toLowerCase();
            let filterGoods = goodsList;
            if (key) filterGoods = goodsList.filter(g => g.name.toLowerCase().includes(key));
            if (filterGoods.length === 0) {
                goodsGrid.innerHTML = `<div class="col-span-full text-center text-gray-400 py-20">暂无匹配商品</div>`;
                return;
            }
            filterGoods.forEach(item => {
                const card = document.createElement("div");
                card.className = "bg-white rounded-lg shadow overflow-hidden";
                card.innerHTML = `
                    <img src="${item.img}" class="w-full h-32 mc-item-img bg-gray-100">
                    <div class="p-3">
                        <h3 class="text-sm font-medium truncate">${item.name}</h3>
                        <p class="text-red-500 font-bold my-2">¥${GOODS_PRICE.toFixed(2)}/件</p>
                        <button onclick="addCartItem(${item.id})" class="w-full py-1.5 bg-mainPurple text-white rounded-lg btn-press text-sm flex items-center justify-center gap-1">
                            <i class="fa fa-plus"></i> 加入购物车
                        </button>
                    </div>
                `;
                goodsGrid.appendChild(card);
            })
        }
        function searchGoods() { renderShopGoods(); }

        // 购物车逻辑
        function refreshCartBadge() {
            cartData = getLocal("mcCart");
            const totalNum = cartData.reduce((s, i) => s + i.count, 0);
            cartBadgeNum.innerText = totalNum;
        }
        window.addCartItem = function (id) {
            const item = goodsList.find(g => g.id === id);
            const exist = cartData.find(c => c.id === id);
            if (exist) exist.count += 1;
            else cartData.push({ id, name: item.name, img: item.img, count: 1 });
            setLocal("mcCart", cartData);
            refreshCartBadge();
            alert(`已添加【${item.name}】到购物车`);
        }
        function openCartPanel() {
            cartPanel.classList.remove("hidden");
            renderCartPanel();
        }
        function closeCartPanel() { cartPanel.classList.add("hidden"); }
        function renderCartPanel() {
            cartData = getLocal("mcCart");
            if (cartData.length === 0) {
                cartEmptyTip.classList.remove("hidden");
                cartItemWrap.classList.add("hidden");
                cartBottomBar.classList.add("hidden");
                return;
            }
            cartEmptyTip.classList.add("hidden");
            cartItemWrap.classList.remove("hidden");
            cartBottomBar.classList.remove("hidden");
            cartItemWrap.innerHTML = "";
            let total = 0;
            cartData.forEach((item, idx) => {
                const singlePrice = (GOODS_PRICE * item.count).toFixed(2);
                total += GOODS_PRICE * item.count;
                const div = document.createElement("div");
                div.className = "flex items-center gap-3 border rounded p-2";
                div.innerHTML = `
                    <img src="${item.img}" class="w-10 h-10 mc-item-img rounded bg-gray-100">
                    <div class="flex-1">
                        <p class="text-sm font-medium truncate">${item.name}</p>
                        <p class="text-red-500 text-sm">¥${GOODS_PRICE} ×${item.count} = ¥${singlePrice}</p>
                    </div>
                    <div class="flex gap-1">
                        <button onclick="cartMinus(${idx})" class="w-7 h-7 border rounded btn-press">-</button>
                        <button onclick="cartPlus(${idx})" class="w-7 h-7 border rounded btn-press">+</button>
                    </div>
                `;
                cartItemWrap.appendChild(div);
            })
            cartTotalPrice.innerText = total.toFixed(2);
        }
        window.cartPlus = function (idx) {
            cartData[idx].count += 1; setLocal("mcCart", cartData); renderCartPanel(); refreshCartBadge();
        }
        window.cartMinus = function (idx) {
            cartData[idx].count -= 1;
            if (cartData[idx].count <= 0) cartData.splice(idx, 1);
            setLocal("mcCart", cartData); renderCartPanel(); refreshCartBadge();
        }
        function clearAllCart() {
            if (!confirm("确认清空全部商品？")) return;
            cartData = []; setLocal("mcCart", cartData); renderCartPanel(); refreshCartBadge();
        }
        function goCheckoutPage() {
            closeCartPanel();
            renderCheckoutPage();
            pageCheckout.classList.remove("hidden");
            pageHome.classList.add("hidden");
        }
        function backToShop() {
            pageCheckout.classList.add("hidden");
            pageHome.classList.remove("hidden");
        }
        function switchPageHome() {
            pageCheckout.classList.add("hidden");
            pageHome.classList.remove("hidden");
        }

        // 结算页面渲染
        function renderCheckoutPage() {
            cartData = getLocal("mcCart");
            checkoutGoodsWrap.innerHTML = "";
            let total = 0;
            cartData.forEach(item => {
                const sub = GOODS_PRICE * item.count;
                total += sub;
                const div = document.createElement("div");
                div.className = "flex justify-between border-b pb-2";
                div.innerHTML = `<span>${item.name} ×${item.count}</span><span>¥${sub.toFixed(2)}</span>`;
                checkoutGoodsWrap.appendChild(div);
            })
            checkoutTotalNum.innerText = total.toFixed(2);
            checkoutPayNum.innerText = total.toFixed(2);
            if (total < 1) minOrderTip.classList.remove("hidden");
            else minOrderTip.classList.add("hidden");
            createVerifyCode();
            // 清空上次生成的加密串
            encryptResultBox.value = "";
        }
        // 生成验证码计算题
        function createVerifyCode() {
            verifyA = Math.floor(Math.random() * 10);
            verifyB = Math.floor(Math.random() * 10);
            verifyAns = verifyA + verifyB;
            verifyQuestion.innerText = `${verifyA} + ${verifyB} = ?`;
            verifyInput.value = "";
        }
        // 提交订单
        window.submitNewOrder = function () {
            cartData = getLocal("mcCart");
            const total = cartData.reduce((s, i) => s + GOODS_PRICE * i.count, 0);
            if (total < 1) return alert("订单金额不足1元，无法下单");
            const name = buyerNameInput.value.trim();
            const qq = buyerQQInput.value.trim();
            const pos = posInput.value.trim();
            const code = Number(verifyInput.value.trim());
            if (!name || !qq || !pos) return alert("请填写完整收货信息");
            const posArr = pos.split(" ").filter(x => x);
            if (posArr.length !== 3 || isNaN(posArr[0]) || isNaN(posArr[1]) || isNaN(posArr[2])) return alert("坐标格式错误，需3个数字空格分隔");
            if (code !== verifyAns) { createVerifyCode(); return alert("验证码答案错误"); }
            alert("订单提交成功！加密送货信息已生成，可复制给配送人员");
            // 清空购物车
            cartData = []; setLocal("mcCart", cartData);
            refreshCartBadge();
            backToShop();
        }
    </script>
</body>
</html>
